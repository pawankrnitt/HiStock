version: 0.2

# This buildspec assumes you are building a Docker image and pushing it to Amazon ECR.
# It also generates an imagedefinitions.json file if you plan to deploy to Amazon ECS.

env:
  variables:
    # We recommend setting these in your CodeBuild Project Environment Variables rather than hardcoding.
    # AWS_DEFAULT_REGION: "us-east-1"
    # AWS_ACCOUNT_ID: "123456789012"
    # IMAGE_REPO_NAME: "histock-backend"
    
phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws --version
      # Authenticate Docker with ECR
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
  build:
    commands:
      - echo "Build started on `date`"
      - echo "Building the Docker image..."
      # Navigate into the backend directory where the Dockerfile lives
      - cd backend
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo "Build completed on `date`"
      - echo "Pushing the Docker images to ECR..."
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo "Writing image definitions file for ECS deployment..."
      - printf '[{"name":"histock-backend-container","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > ../imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
